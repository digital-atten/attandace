<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance App - Live Portal</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark-bg: #1e293b;
            --danger: #ef4444;
            --danger-dark: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }

        /* DESIGN LAYER 1: LOGIN GATEWAY */
        #loginPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #2ecc71 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .login-card h2 { color: #fff; margin-bottom: 5px; font-size: 28px; }
        .login-card p { color: #cbd5e1; font-size: 13px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #fff; font-size: 12px; margin-bottom: 6px; font-weight: 600; }
        .input-group input { width: 100%; padding: 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; font-size: 15px; outline: none; }
        
        .btn-login { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); transition: 0.2s; }
        .btn-login:hover { background: var(--primary-dark); }
        .login-error { color: #f87171; font-size: 14px; margin-top: 15px; display: none; background: rgba(239, 68, 68, 0.2); padding: 8px; border-radius: 6px; }

        /* DESIGN LAYER 2: WORKSPACE */
        #appDashboard { display: none; }
        .main-header { background: #2ecc71; color: white; padding: 18px; text-align: center; font-size: 24px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .main-container { max-width: 800px; width: 100%; margin: 30px auto; padding: 20px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .student-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .student-input-box input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 15px; }
        
        .btn-action { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-add { background: var(--primary); }
        .btn-add:hover { background: var(--primary-dark); }

        .counter-strip { background: #f8fafc; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; color: #475569; margin-bottom: 20px; border: 1px solid #e2e8f0; font-size: 16px; }
        
        .student-item { display: flex; flex-direction: column; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 12px; text-align: center; }
        .student-info { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #1e293b; }
        .btn-group { display: flex; gap: 8px; }
        
        .btn-state { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-p { background: #e8f5e9; color: #2e7d32; }
        .btn-p.active { background: var(--primary); color: white; }
        .btn-a { background: #ffebee; color: #c62828; }
        .btn-a.active { background: var(--danger); color: white; }
        .btn-del { background: #f3f4f6; color: #4b5563; }
        .btn-del:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <h2>Portal Login</h2>
            <p>Authorized Teacher Accounts Only</p>
            <div class="input-group">
                <label>Username / Teacher ID</label>
                <input type="text" id="usernameInput" placeholder="Username daliye" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="passwordInput" placeholder="Password daliye">
            </div>
            <button type="button" class="btn-login" onclick="validateAndEnter(event)">Verify & Enter Dashboard</button>
            <div class="login-error" id="loginErrorMsg"></div>
        </div>
    </div>

    <div id="appDashboard">
        <header class="main-header">📋 Attendance App</header>
        
        <main class="main-container">
            <div class="student-input-box">
                <input type="text" id="studentNameInput" placeholder="Student name yahan likhein...">
                <button type="button" class="btn-action btn-add" onclick="addNewStudent(event)">Add Student</button>
            </div>

            <div class="counter-strip" id="counterStrip">
                Total: 0 | Present: 0 | Absent: 0
            </div>

            <div id="studentListContainer"></div>
        </main>
    </div>

    <script>
        // Credentials Control Config
        var AUTH_USER = "pradip";
        var AUTH_PASS = "pradip@2026";

        // Memory State Repository
        var studentsData = JSON.parse(localStorage.getItem("app_students_list")) || [];

        // Dynamic State Auto-Recovery Engine
        window.addEventListener("DOMContentLoaded", function() {
            var activeSession = sessionStorage.getItem("is_logged_in");
            if (activeSession === "true") {
                displayDashboard();
            }
        });

        // 100% Anti-Reload Form Verification Loop
        function validateAndEnter(e) {
            if(e) { e.preventDefault(); e.stopPropagation(); } // Page reload block engine
            
            var userField = document.getElementById("usernameInput").value.trim();
            var passField = document.getElementById("passwordInput").value.trim();
            var errorLabel = document.getElementById("loginErrorMsg");

            if (userField === AUTH_USER && passField === AUTH_PASS) {
                errorLabel.style.display = "none";
                sessionStorage.setItem("is_logged_in", "true");
                displayDashboard();
            } else {
                errorLabel.style.display = "block";
                errorLabel.innerText = "❌ Galat Details! Sahi Username/Password dalein.";
            }
            return false;
        }

        function displayDashboard() {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("appDashboard").style.display = "block";
            renderInterface();
        }

        // Add Student Core
        function addNewStudent(e) {
            if(e) { e.preventDefault(); }
            var nameInp = document.getElementById("studentNameInput");
            var nameVal = nameInp.value.trim();
            
            if(!nameVal) return;

            studentsData.push({
                id: "id_" + Date.now(),
                name: nameVal,
                status: "Present" // Default configuration standard match
            });

            localStorage.setItem("app_students_list", JSON.stringify(studentsData));
            nameInp.value = "";
            renderInterface();
        }

        // Toggle Status System
        function changeStatus(id, newStatus, e) {
            if(e) { e.preventDefault(); }
            studentsData = studentsData.map(function(s) {
                if(s.id === id) { s.status = newStatus; }
                return s;
            });
            localStorage.setItem("app_students_list", JSON.stringify(studentsData));
            renderInterface();
        }

        // Purge Student System
        function deleteStudent(id, e) {
            if(e) { e.preventDefault(); }
            studentsData = studentsData.filter(function(s) { return s.id !== id; });
            localStorage.setItem("app_students_list", JSON.stringify(studentsData));
            renderInterface();
        }

        // High Performance Render Slate
        function renderInterface() {
            var container = document.getElementById("studentListContainer");
            container.innerHTML = "";

            var total = studentsData.length;
            var present = 0;
            var absent = 0;

            studentsData.forEach(function(student) {
                if(student.status === "Present") present++;
                if(student.status === "Absent") absent++;

                var div = document.createElement("div");
                div.className = "student-item";
                div.innerHTML = `
                    <div class="student-info">${student.name} - ${student.status}</div>
                    <div class="btn-group">
                        <button type="button" class="btn-state btn-p ${student.status === 'Present' ? 'active' : ''}" onclick="changeStatus('${student.id}', 'Present', event)">Present</button>
                        <button type="button" class="btn-state btn-a ${student.status === 'Absent' ? 'active' : ''}" onclick="changeStatus('${student.id}', 'Absent', event)">Absent</button>
                        <button type="button" class="btn-state btn-del" onclick="deleteStudent('${student.id}', event)">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById("counterStrip").innerText = `Total: ${total} | Present: ${present} | Absent: ${absent}`;
        }
    </script>
</body>
</html>
