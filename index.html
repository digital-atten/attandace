<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRTMNU Matrix ERP v4.0</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark-bg: #0f172a;
            --card-white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --accent: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; color: var(--text-main); min-height: 100vh; }
        
        /* LOGIN CARD STYLING */
        #loginScreenContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 60%, var(--primary) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-matrix-box {
            background: #ffffff; padding: 40px; border-radius: 16px;
            width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center;
        }
        .login-matrix-box h2 { color: var(--dark-bg); font-size: 24px; margin-bottom: 8px; font-weight: 800; }
        .login-matrix-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
        .input-wrapper { margin-bottom: 18px; text-align: left; }
        .input-wrapper label { display: block; font-size: 11px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; text-transform: uppercase; }
        .input-wrapper input { width: 100%; padding: 12px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-weight: 600; outline: none; }
        .btn-submit-auth { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 8px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-submit-auth:hover { background: var(--primary-dark); }
        .auth-error-shield { color: var(--danger); font-size: 12px; margin-top: 12px; display: none; font-weight: bold; background: #fee2e2; padding: 10px; border-radius: 6px; }

        /* MAIN APP DASHBOARD */
        #dashboardMainContainer { display: none; }
        .app-navbar { background: var(--dark-bg); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
