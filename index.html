<html lang="en">

    <title>Matrix Multi-Tenant Polyglot ERP System</title>
    
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark-bg: #0f172a;
            --card-white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --accent: #3b82f6;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* LOGIN SCREEN DESIGN */
        #loginScreenContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 60%, var(--primary) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-matrix-box {
            background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 16px;
            width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center;
        }

        .login-matrix-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; }
