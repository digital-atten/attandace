<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRTMNU Enterprise Attendance Matrix Pro</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark-bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --accent: #3b82f6;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f1f5f9; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* SECURITY GATEWAY LAYER */
        #loginPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #2ecc71 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 20px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .login-card h2 { color: #fff; margin-bottom: 8px; font-size: 26px; font-weight: bold; }
        .login-card p { color: #cbd5e1; font-size: 13px; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; color: #fff; font-size: 12px; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-size: 15px; outline: none; }
        .btn-login { width: 100%; padding: 13px; background: var(--primary); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .btn-login:hover { background: var(--primary-dark); }
        .login-error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; background: rgba(239, 68, 68, 0.2); padding: 8px; border-radius: 6px; font-weight: bold; }

        /* MAIN DASHBOARD RENDER FRAMEWORK */
        #appDashboard { display: none; }
        .main-header { background: var(--dark-bg); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header-brand { font-size: 20px; font-weight: bold; }
        
        /* 3-DOT OPTION CONTROL UNIT */
        .menu-container { position: relative; display: inline-block; }
        .three-dots { font-size: 28px; cursor: pointer; padding: 2px 12px; color: white; user-select: none; font-weight: bold; border-radius: 6px; background: rgba(255,255,255,0.1); }
        .dropdown-menu { 
            display: none; position: absolute; right: 0; top: 45px; background: white; 
            min-width: 250px; box-shadow: 0px 8px 24px rgba(0,0,0,0.15); border-radius: 10px; z-index: 1000; overflow: hidden; border: 1px solid #e2e8f0;
        }
        .dropdown-menu a { color: var(--text-main); padding: 12px 18px; text-decoration: none; display: block; font-size: 13px; cursor: pointer; font-weight: 600; border-bottom: 1px solid #f1f5f9; }
