<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Attendance Portal</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --dark-bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f1f5f9;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* PREMIUM GLASSMORPHIC LOGIN LAYER */
        #loginPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #2ecc71 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .login-logo {
            color: var(--primary);
            font-size: 50px;
            margin-bottom: 15px;
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-card p {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #fff;
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        .btn-login:hover {
            background: var(--primary-dark);
        }

        .login-error {
            color: #f87171;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.2);
            padding: 8px;
            border-radius: 6px;
        }

        /* SYSTEM CORE DASHBOARD WORKSPACE */
        #appDashboard {
            display: none;
        }

        .main-header {
            background: var(--dark-bg);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-brand {
            font-size: 20px;
            font-weight: bold;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .main-container {
            max-width: 1300px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .dashboard-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
        }

        .dashboard-card h3 {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .form-control {
            margin-bottom: 16px;
        }

        .form-control label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control select, .form-control textarea, .form-control input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background: #f8fafc;
        }

        .action-cluster {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
        }

        .action-btn.secondary { background: #64748b; }
        .action-btn.accent { background: #0284c7; }

        .live-counter-strip {
            background: var(--dark-bg);
            color: white;
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .strip-right { display: flex; gap: 25px; font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 14px; }
        .badge.total { background: rgba(255,255,255,0.15); }
        .badge.present { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .badge.absent { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .workspace-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .student-table { width: 100%; border-collapse: collapse; }
        .student-table th { text-align: left; padding: 12px 16px; background: #f8fafc; color: var(--text-muted); border-bottom: 1px solid #e2e8f0;}
        .student-table td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9;}

        .btn-row {
            border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 4px;
        }
        .btn-row.p-btn { background: #e8f5e9; color: #2e7d32; }
        .btn-row.p-btn.active { background: var(--primary); color: white; }
        .btn-row.a-btn { background: #ffebee; color: #c62828; }
        .btn-row.a-btn.active { background: var(--danger); color: white; }
        .btn-row.d-btn { background: #f1f5f9; color: #64748b; }

        .status-pill { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .pill-none { background: #e2e8f0; color: #475569; }
        .pill-present { background: #dcfce7; color: #15803d; }
        .pill-absent { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <div class="login-logo">🔒</div>
            <h2>Portal Login</h2>
            <p>Authorized Teacher Accounts Only</p>
            
            <div class="input-group">
                <label>Username / Teacher ID</label>
                <input type="text" id="usernameInput" placeholder="Enter ID here" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="passwordInput" placeholder="Enter Password here">
            </div>

            <button type="button" class="btn-login" id="mainSubmitTriggerBtn" onclick="validateCredentialsAndOpen(event)">Verify & Enter Dashboard</button>
            <div class="login-error" id="loginErrorMsg"></div>
        </div>
    </div>

    <div id="appDashboard">
        <header class="main-header">
            <div class="header-brand">
                <span style="color:var(--primary)">Attendance Matrix</span> Pro
            </div>
            <div class="user-profile">
                <span id="displayTeacherName" style="font-weight: bold;">Prof. PRADIP</span>
                <button type="button" class="btn-logout" onclick="performLogout()">Logout</button>
            </div>
        </header>

        <main class="main-container">
            <div class="panel-grid">
                <div class="dashboard-card">
                    <h3>⚙️ 1. Configurations</h3>
                    <div class="form-control">
                        <label>Select Room / Assigned Batch</label>
                        <select id="classroomSelection">
                            <option value="BCA IV Semester">BCA IV Semester</option>
                            <option value="BCA II Semester">BCA II Semester</option>
                            <option value="BCA VI Semester">BCA VI Semester</option>
                        </select>
                    </div>
                    <div class="action-cluster">
                        <button type="button" class="action-btn secondary" onclick="createNewAttendanceSession()">Reset Session</button>
                    </div>
                </div>

                <div class="dashboard-card">
                    <h3>📥 2. Data Upload Center</h3>
                    <div class="form-control">
                        <label>Paste Student Names (Comma Separated)</label>
                        <textarea id="bulkDataInput" placeholder="Pradip, Rahul, Amit..."></textarea>
                    </div>
                    <div class="action-cluster">
                        <button type="button" class="action-btn" onclick="processBulkNamesImport()">Load Students</button>
                        <button type="button" class="action-btn accent" onclick="generateAndShareReport()">Share Report</button>
                    </div>
                </div>
            </div>

            <div class="live-counter-strip">
                <div>Active Batch: <span id="stripActiveBatchText" style="color:var(--primary); font-weight:bold;">BCA IV Semester</span></div>
                <div class="strip-right">
                    <div>Total: <span class="badge total" id="lblTotalCount">0</span></div>
                    <div>Present: <span class="badge present" id="lblPresentCount">0</span></div>
                    <div>Absent: <span class="badge absent" id="lblAbsentCount">0</span></div>
                </div>
            </div>

            <div class="workspace-card">
                <div class="workspace-header">
                    <h2>Live Register</h2>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="singleStudentInput" placeholder="Quick name..." style="width:200px; padding:8px;">
                        <button type="button" class="action-btn" style="padding:0 15px;" onclick="injectSingleStudentRow()">Add</button>
                    </div>
                </div>
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Status State</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="masterTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        var globalStudentsList = [];

        // Core Handler with explicit reload blocks
        function validateCredentialsAndOpen(event) {
            if(event) {
                event.preventDefault(); // Stop page from hard resetting
                event.stopPropagation();
            }

            var usernameField = document.getElementById("usernameInput");
            var passwordField = document.getElementById("passwordInput");
            var errorDisplay = document.getElementById("loginErrorMsg");

            if(!usernameField || !passwordField) return false;

            var userVal = usernameField.value.trim().toLowerCase();
            var passVal = passwordField.value.trim();

            if (userVal === "pradip" && passVal === "pradip@2026") {
                errorDisplay.style.display = "none";
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("appDashboard").style.display = "block";
                document.getElementById("displayTeacherName").innerText = "Prof. PRADIP";
                syncGlobalUIState();
            } else {
                errorDisplay.style.display = "block";
                errorDisplay.innerText = "❌ Username ya Password galat hai bhai!";
            }
            return false;
        }

        // Window level override to capture and block standard form submittals
        window.addEventListener("submit", function(e) {
            e.preventDefault();
        });

        // Enter Key Router Setup
        window.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                validateCredentialsAndOpen(e);
            }
        });

        function performLogout() {
            document.getElementById("usernameInput").value = "";
            document.getElementById("passwordInput").value = "";
            document.getElementById("appDashboard").style.display = "none";
            document.getElementById("loginPage").style.display = "flex";
            if(document.getElementById("loginErrorMsg")) {
                document.getElementById("loginErrorMsg").style.display = "none";
            }
        }

        function syncGlobalUIState() {
            document.getElementById("stripActiveBatchText").innerText = document.getElementById("classroomSelection").value;
            document.getElementById("lblTotalCount").innerText = globalStudentsList.length;
            document.getElementById("lblPresentCount").innerText = globalStudentsList.filter(function(s){return s.status==='Present'}).length;
            document.getElementById("lblAbsentCount").innerText = globalStudentsList.filter(function(s){return s.status==='Absent'}).length;
            renderStudentsTableRows();
        }

        function renderStudentsTableRows() {
            var tbody = document.getElementById("masterTableBody");
            tbody.innerHTML = "";
            if (globalStudentsList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding:20px; font-style:italic;">No active student logs loaded. Paste bulk data above.</td></tr>';
                return;
            }
            globalStudentsList.forEach(function(student) {
                var tr = document.createElement("tr");
                var pActive = student.status === 'Present' ? 'active' : '';
                var aActive = student.status === 'Absent' ? 'active' : '';
                var pill = 'pill-none';
                if(student.status==='Present') pill='pill-present';
                if(student.status==='Absent') pill='pill-absent';

                tr.innerHTML = '<td><strong>'+student.name+'</strong></td>' +
                    '<td><span class="status-pill '+pill+'">'+student.status+'</span></td>' +
                    '<td style="text-align: right;">' +
                        '<button type="button" class="btn-row p-btn '+pActive+'" onclick="mutateStudentStatus('+student.id+',\'Present\')">Present</button>' +
                        '<button type="button" class="btn-row a-btn '+aActive+'" onclick="mutateStudentStatus('+student.id+',\'Absent\')">Absent</button>' +
                        '<button type="button" class="btn-row d-btn" onclick="purgeStudentRowEntity('+student.id+')">Delete</button>' +
                    '</td>';
                tbody.appendChild(tr);
            });
        }

        function processBulkNamesImport() {
            var val = document.getElementById("bulkDataInput").value.trim();
            if(!val) return;
            val.split(",").forEach(function(name) {
                if(name.trim()) globalStudentsList.push({ id: Date.now() + Math.random(), name: name.trim(), status: "None" });
            });
            document.getElementById("bulkDataInput").value = "";
            syncGlobalUIState();
        }

        function injectSingleStudentRow() {
            var input = document.getElementById("singleStudentInput");
            if(!input.value.trim()) return;
            globalStudentsList.push({ id: Date.now(), name: input.value.trim(), status: "None" });
            input.value = "";
            syncGlobalUIState();
        }

        function mutateStudentStatus(id, state) {
            var target = globalStudentsList.find(function(s){return s.id === id});
            if(target) { target.status = state; syncGlobalUIState(); }
        }

        function purgeStudentRowEntity(id) {
            globalStudentsList = globalStudentsList.filter(function(s){return s.id !== id});
            syncGlobalUIState();
        }

        function createNewAttendanceSession() {
            if(confirm("Clear current attendance list?")) { globalStudentsList = []; syncGlobalUIState(); }
        }

        function generateAndShareReport() {
            if(globalStudentsList.length === 0) return;
            var reportText = "📊 ATTENDANCE REPORT\nBatch: " + document.getElementById("classroomSelection").value + "\n\n";
            globalStudentsList.forEach(function(s, idx) {
                var icon = s.status === 'Present' ? '✅' : (s.status === 'Absent' ? '❌' : '➖');
                reportText += (idx + 1) + ". " + s.name + " -> " + icon + " " + s.status + "\n";
            });
            navigator.clipboard.writeText(reportText).then(function() { alert("Report Copied to Clipboard!"); });
        }

        document.getElementById("classroomSelection").addEventListener("change", syncGlobalUIState);
    </script>
</body>
</html>
