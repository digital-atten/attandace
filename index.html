<!DOCTYPE html>
<html>

<head>
    <title>Attendance App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        
        /* 🔒 लॉगिन स्क्रीन का डिज़ाइन */
        #login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #login-container h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }

        #login-container input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        #login-container button {
            width: 85%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        #login-container button:hover {
            background-color: #45a049;
        }

        .error-msg {
            color: red;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        /* 📋 अटेंडेंस ऐप का डिज़ाइन */
        h1 {
            background: #4CAF50;
            color: white;
            padding: 10px;
            margin-top: 0;
        }
        
        #main-app-content input {
            padding: 10px;
            width: 70%;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        #main-app-content button {
            padding: 8px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        
        li {
            background: white;
            margin: 5px auto;
            padding: 10px;
            list-style: none;
            border-radius: 5px;
            max-width: 80%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* शुरुआत में असली ऐप छुपा रहेगा */
        #main-app-content {
            display: none;
        }
    </style>
</head>

<body>

    <!-- 1. 🔒 लॉगिन स्क्रीन -->
    <div id="login-container">
        <h2>🔒 Attendance App Login</h2>
        <p>आगे बढ़ने के लिए पासवर्ड दर्ज करें</p>
        <input type="password" id="password-input" placeholder="पासवर्ड यहाँ लिखें...">
        <br>
        <button onclick="checkPassword()">Log In</button>
        <div id="error-message" class="error-msg">गलत पासवर्ड! कृपया दोबारा कोशिश करें।</div>
    </div>

    <!-- 2. 📋 आपका असली अटेंडेंस ऐप -->
    <div id="main-app-content">
        <h1>📋 Attendance App</h1>

        <input type="text" id="name" placeholder="Enter student name">
        <br>
        <button onclick="addStudent()">Add Student</button>

        <h3 id="total"></h3>

        <ul id="list"></ul>
    </div>

    <script>
        // 🔑 लॉगिन चेक करने का लॉजिक
        function checkPassword() {
            var enteredPassword = document.getElementById('password-input').value;
            var correctPassword = "admin123"; 

            if (enteredPassword === correctPassword) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-app-content').style.display = 'block';
                display();
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        }

        // Enter की दबाने पर लॉगिन
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // 📋 अटेंडेंस ऐप का लॉजिक
        var students = JSON.parse(localStorage.getItem("students")) || [];

        function addStudent() {
            var name = document.getElementById("name").value;
            if (name === "") return;

            students.push({
                name: name,
                status: "Absent"
            });

            saveData();
            display();
            document.getElementById("name").value = "";
        }

        function mark(index, status) {
            students[index].status = status;
            saveData();
            display();
        }

        function del(index) {
            students.splice(index, 1);
            saveData();
            display();
        }

        function saveData() {
            localStorage.setItem("students", JSON.stringify(students));
        }

        function display() {
            var list = document.getElementById("list");
            list.innerHTML = "";

            students.forEach(function(s, index) {
                var li = document.createElement("li");
                li.innerHTML =
                    s.name + " - " + s.status +
                    "<br>" +
                    "<button onclick='mark(" + index + ", \"Present\")'>Present</button>" +
                    "<button onclick='mark(" + index + ", \"Absent\")'>Absent</button>" +
                    "<button onclick='del(" + index + ")'>Delete</button>";
                list.appendChild(li);
            });

            updateTotal();
        }

        function updateTotal() {
            var total = students.length;
            var present = students.filter(function(s) { return s.status === "Present"; }).length;
            var absent = students.filter(function(s) { return s.status === "Absent"; }).length;

            document.getElementById("total").innerText =
                "Total: " + total + " | Present: " + present + " | Absent: " + absent;
        }
    </script>

</body>

</html>
